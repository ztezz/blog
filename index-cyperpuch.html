<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard — AI Neuron Network</title>

<style>
/* RESET */
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#05070e;
  font-family:Inter,system-ui,sans-serif;
  color:white;
}

/* ===== LAYER 1 — AI NEURON BACKGROUND ===== */
#neuron-bg{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:block;
  z-index:0 !important;
  pointer-events:none;
  background:#05070e;
}

/* ===== LAYER 2 — UI ===== */
#ui-layer{
  position:relative;
  z-index:10 !important;
  width:100%;
  height:100%;
  padding-top:40px;
}

/* PANEL */
.panel{
  max-width:980px;
  margin:0 auto;
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:28px;
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(6px) saturate(150%);
  box-shadow:0 12px 35px rgba(0,0,0,0.45);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:14px;
}

.logo{
  width:56px;
  height:56px;
  border-radius:14px;
  background:rgba(255,255,255,0.10);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  font-weight:700;
}

.title{ font-size:20px; font-weight:700; }
.subtitle{ font-size:13px; color:#9fb0c9; }

/* GRID CARD */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  position:relative;
  padding:18px;
  height:130px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  gap:14px;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-6px) scale(1.04);
  box-shadow:0 16px 40px rgba(0,0,0,0.55);
}

/* ICON */
.icon-wrap{
  width:72px;
  height:72px;
  border-radius:14px;
  background:rgba(255,255,255,0.12);
  display:flex;
  justify-content:center;
  align-items:center;
}

.icon-wrap svg{
  filter:drop-shadow(0 0 6px rgba(255,150,255,0.7));
}

/* TEXT */
.name{ font-size:16px; font-weight:700; }
.desc{ font-size:13px; color:#9fb0c9; }

/* BADGE */
.badge{
  position:absolute;
  top:12px;
  right:12px;
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  background:#c7f9cc;
  color:#08180c;
  font-weight:700;
}
.badge.off{
  background:#ffd1d1;
  color:#561010;
}

/* FOOT */
.foot{
  margin-top:22px;
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#9fb0c9;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.14);
  color:#9fb0c9;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ========== NEURON BACKGROUND ========== -->
<canvas id="neuron-bg"></canvas>

<!-- ========== UI LAYER ========== -->
<div id="ui-layer">
  <div class="panel">

    <div class="header">
      <div class="logo">TH</div>
      <div>
        <div class="title">Bảng điều khiển — AI Neuron</div>
        <div class="subtitle">Nền Neuron • Synapse • Wave theo chuột</div>
      </div>
    </div>

    <div class="grid">

      <!-- DRIVE -->
      <div class="card" data-url="http://gisvietnam.ddns.net:3000">
        <div class="icon-wrap">
          <svg width="40" height="40" stroke="#fff" fill="none">
            <rect x="3" y="7" width="18" height="10" rx="2" stroke-width="1.2"/>
            <path d="M8 7V5a4 4 0 0 1 8 0v2" stroke-width="1.2"/>
            <circle cx="7.5" cy="12" r="1" fill="#fff"/>
            <circle cx="16.5" cy="12" r="1" fill="#fff"/>
          </svg>
        </div>
        <div>
          <div class="name">Drive</div>
          <div class="desc">http://gisvietnam.ddns.net:3000</div>
        </div>
        <div class="badge" id="badge-drive">Kiểm tra...</div>
      </div>

      <!-- WEBGIS -->
      <div class="card" data-url="http://gisvietnam.ddns.net:3003">
        <div class="icon-wrap">
          <svg width="40" height="40" stroke="#fff" fill="none">
            <path d="M3 6l6-2 6 2 6-2v12l-6 2-6-2-6 2V6z" stroke-width="1.2"/>
            <path d="M9 4v14" stroke-width="1.2"/>
            <path d="M15 6v12" stroke-width="1.2"/>
          </svg>
        </div>
        <div>
          <div class="name">WebGIS</div>
          <div class="desc">http://gisvietnam.ddns.net:3003</div>
        </div>
        <div class="badge" id="badge-webgis">Kiểm tra...</div>
      </div>

    </div>

    <div class="foot">
      <div>Bấm vào thẻ để mở dịch vụ</div>
      <div>
        <button class="btn" id="open-new">Tab mới</button>
        <button class="btn" id="open-same">Cùng tab</button>
      </div>
    </div>

  </div>
</div>

<!-- ========== AI NEURON SCRIPT ========== -->
<script>
/* ======================
      CYBERPUNK NEON NEURON
   ====================== */

   const canvas = document.getElementById("neuron-bg");
const ctx = canvas.getContext("2d");

let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;

addEventListener("resize", () => {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
});

// CYBERPUNK COLOR PALETTE
const COLORS = [
  [0, 234, 255],   // CYAN
  [255, 0, 255],   // MAGENTA
];

const COUNT = 80;
const LINK = 170;
const RADIUS = 180;

let nodes = [];

for (let i = 0; i < COUNT; i++) {
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  nodes.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.65,
    vy: (Math.random() - 0.5) * 0.65,
    r: 1.6 + Math.random() * 1.7,
    phase: Math.random() * 6.28,
    color
  });
}

let mouse = { x: null, y: null };
addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
addEventListener("mouseleave", () => mouse.x = null);

function draw() {
  ctx.clearRect(0, 0, W, H);

  // DRAW NODES
  nodes.forEach(n => {
    let pulse = (Math.sin(n.phase) + 1) * 0.5;
    n.phase += 0.04; // pulse nhanh hơn → cyberpunk hơn

    let [r, g, b] = n.color;

    // Glow mạnh kiểu neon
    ctx.beginPath();
    ctx.shadowBlur = 15 + pulse * 18;
    ctx.shadowColor = `rgba(${r},${g},${b},1)`;
    ctx.fillStyle = `rgba(${r},${g},${b},0.95)`;
    ctx.arc(n.x, n.y, n.r + pulse * 1.4, 0, 6.28);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Movement
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;

    // Mouse wave push
    if (mouse.x) {
      let dx = n.x - mouse.x,
          dy = n.y - mouse.y,
          dist = Math.hypot(dx, dy);
      if (dist < RADIUS) {
        let f = (RADIUS - dist) / RADIUS;
        n.vx += (dx / dist) * f * 1.6;
        n.vy += (dy / dist) * f * 1.6;
      }
    }
  });

  // DRAW CYBERPUNK LASER SYNAPSE
  for (let i = 0; i < COUNT; i++) {
    for (let j = i + 1; j < COUNT; j++) {
      const a = nodes[i], b = nodes[j];

      let dx = a.x - b.x,
          dy = a.y - b.y,
          dist = Math.hypot(dx, dy);

      if (dist < LINK) {
        let alpha = (1 - dist / LINK) * 0.35;

        // Laser-like color blending
        const midColor = [
          (a.color[0] + b.color[0]) / 2,
          (a.color[1] + b.color[1]) / 2,
          (a.color[2] + b.color[2]) / 2
        ];

        ctx.strokeStyle = `rgba(${midColor[0]},${midColor[1]},${midColor[2]},${alpha})`;
        ctx.lineWidth = 1.4;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

<!-- ========== HEALTH CHECK FIXED ========== -->
<script>
async function checkService(url,badgeId){
  const badge=document.getElementById(badgeId);
  badge.textContent="Kiểm tra...";

  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),1500);

  try{
    await fetch(url,{mode:"no-cors",signal:controller.signal});
    badge.textContent="Trực tuyến";
    badge.classList.remove("off");
  }catch{
    badge.textContent="Ngoại tuyến";
    badge.classList.add("off");
  }
  clearTimeout(timeout);
}

function runCheck(){
  checkService("http://gisvietnam.ddns.net:3000","badge-drive");
  checkService("http://gisvietnam.ddns.net:3003","badge-webgis");
}
runCheck();
setInterval(runCheck,6000);

/* Navigate */
let openNew=true;
document.getElementById("open-new").onclick=()=>openNew=true;
document.getElementById("open-same").onclick=()=>openNew=false;
document.querySelectorAll(".card").forEach(c=>{
  c.onclick=()=>openNew?window.open(c.dataset.url):location.href=c.dataset.url;
});
</script>

</body>
</html>
