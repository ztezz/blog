
<!DOCTYPE html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GISVN - Bản Đồ Của Vũ Trụ</title>
    <!-- Vẫn giữ Tailwind CDN để tiện lợi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thay đổi font: Sử dụng Exo 2 (Sci-Fi) và Be Vietnam Pro (Tiếng Việt chuẩn) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class', // QUAN TRỌNG: Cho phép toggle class 'dark' thủ công
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Be Vietnam Pro"', 'sans-serif'],
              display: ['"Exo 2"', 'sans-serif'],
            },
            colors: {
              space: {
                900: '#0f172a', /* Dark Blue Base */
                800: '#1e293b', /* Dark Blue Surface */
                light: '#e2e8f0',
                neon: '#38bdf8', /* Sky 400 */
                accent: '#0ea5e9', /* Sky 500 */
                purple: '#a855f7',
              },
              sky: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                800: '#075985',
                900: '#0c4a6e',
              }
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 12s linear infinite',
              'cloud-move': 'cloudMove 60s linear infinite',
              'rocket-fly': 'rocketFly 10s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              cloudMove: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100vw)' },
              },
              rocketFly: {
                '0%': { transform: 'translateY(100vh) scale(0.8)' },
                '100%': { transform: 'translateY(-20vh) scale(0.8)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        /* Mặc định màu nền cho Light Mode, Dark Mode sẽ được override bởi Tailwind classes */
        background-color: #f0f9ff; 
        color: #0f172a;
        overflow-x: hidden;
        min-height: 100vh;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      
      /* Dark Mode Global Styles */
      html.dark body {
        background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        color: #e2e8f0;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      html.dark ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #0ea5e9; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0284c7; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <!-- Script Entry Point cho Vite -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
